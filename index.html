<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Utama - Wujud Zat & Model Partikel</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           1. PENGATURAN LAYAR & AUTO SCALE
           ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: #2b2b2b;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
        }

        #app-container {
            width: 1280px; height: 720px;
            background-color: #E6F4FE;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; 
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            transform-origin: center center;
        }

        .bg-blob {
            position: absolute; top: -100px; left: -100px;
            width: 800px; height: 800px; background: #B3E5FC;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            z-index: 0; opacity: 0.5;
        }
        
        .desk {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60px;
            background: #E2E8F0; border-top: 6px solid #CBD5E1;
            z-index: 0; display: flex; align-items: center; justify-content: space-around;
        }
        .drawer { width: 150px; height: 10px; background: #94A3B8; border-radius: 5px; opacity: 0.5;}

        /* =========================================
           2. HEADER
           ========================================= */
        header {
            position: relative; z-index: 10;
            text-align: center; margin-top: 80px; 
        }

        h1.main-title {
            font-family: 'Fredoka', sans-serif; font-size: 4rem; color: #00BFFF;
            text-shadow: -3px -3px 0 #FFF, 3px -3px 0 #FFF, -3px 3px 0 #FFF, 3px 3px 0 #FFF, 0px 8px 0px rgba(0,0,0,0.1);
            letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase;
        }
        
        .sub-title {
            font-family: 'Nunito', sans-serif; font-size: 1.6rem; color: #4A5568; font-weight: 800;
            background: #FFF; display: inline-block; padding: 10px 30px; border-radius: 30px;
            border: 4px solid #FFF; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* =========================================
           3. MENU GRID UTAMA
           ========================================= */
        .main-content {
            position: relative; z-index: 10; flex: 1;
            display: flex; justify-content: center; align-items: center;
            padding-bottom: 50px; 
        }

        .menu-grid {
            display: flex; gap: 40px; justify-content: center;
        }

        .menu-card {
            width: 290px; height: 360px;
            background: #FFFFFF; border-radius: 35px;
            text-decoration: none; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            padding: 25px; transition: transform 0.15s, box-shadow 0.15s;
            border: 8px solid; box-shadow: 0 15px 0;
            position: relative; overflow: hidden;
            background-image: linear-gradient(180deg, #FFFFFF 0%, #F8FAFC 100%);
        }

        .menu-card:active { 
            transform: translateY(15px); 
        }

        /* Warna per menu */
        .color-sim { 
            border-color: #00BFFF; 
            box-shadow: 0 15px 0 #008CBA; 
        }
        .color-sim:active { box-shadow: 0 0px 0 #008CBA; }
        
        .color-kuis { 
            border-color: #F59E0B; 
            box-shadow: 0 15px 0 #D97706; 
        }
        .color-kuis:active { box-shadow: 0 0px 0 #D97706; }
        
        .color-eva { 
            border-color: #4CAF50; 
            box-shadow: 0 15px 0 #388E3C; 
        }
        .color-eva:active { box-shadow: 0 0px 0 #388E3C; }

        .menu-icon { 
            font-size: 6.5rem; margin-bottom: 15px; 
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .menu-card:hover .menu-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .menu-title { 
            font-family: 'Fredoka', sans-serif; font-size: 2.3rem; 
            color: #1E293B; margin-bottom: 10px; text-transform: uppercase;
        }
        .menu-desc { 
            font-family: 'Nunito', sans-serif; font-size: 1.15rem; 
            color: #4A5568; font-weight: 800; line-height: 1.3;
        }

    </style>
</head>
<body>

    <div id="app-container">
        <div class="bg-blob"></div>
        <div class="desk">
            <div class="drawer"></div><div class="drawer"></div><div class="drawer"></div><div class="drawer"></div>
        </div>

        <header>
            <h1 class="main-title">Selamat Datang!</h1>
            <div class="sub-title">Aktivitas Interaktif Wujud Zat & Model Partikel</div>
        </header>

        <div class="main-content">
            <div class="menu-grid">
                
                <a href="simulasi.html" class="menu-card color-sim">
                    <div class="menu-icon">🔬</div>
                    <div class="menu-title">Simulasi</div>
                    <div class="menu-desc">Eksplorasi model partikel dan amati perubahan suhu.</div>
                </a>
                
                <a href="kuis.html" class="menu-card color-kuis">
                    <div class="menu-icon">🕹️</div>
                    <div class="menu-title">Kuis</div>
                    <div class="menu-desc">Latih pemahamanmu dengan berbagai permainan seru.</div>
                </a>
                
                <a href="evaluasi.html" class="menu-card color-eva">
                    <div class="menu-title" style="font-size: 1.8rem; color: #4CAF50; margin-top:-10px;">⭐</div>
                    <div class="menu-icon" style="margin-bottom: 5px;">📝</div>
                    <div class="menu-title">Evaluasi</div>
                    <div class="menu-desc">Uji kemampuanmu dan raih skor tertinggi!</div>
                </a>

            </div>
        </div>
    </div>

    <script>
        // --- 1. Fungsi Auto-Scale Layar ---
        function scaleApp() {
            const container = document.getElementById('app-container');
            const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
            container.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', scaleApp);
        scaleApp();
    </script>
</body>
</html>
